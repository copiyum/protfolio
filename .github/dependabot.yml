version: 2
updates:
  # npm dependencies — security + version bumps as PRs
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # batch dev-only bumps into one PR to cut noise
      dev-dependencies:
        dependency-type: development

  # keep the GitHub Actions themselves patched
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
