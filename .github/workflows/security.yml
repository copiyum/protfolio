name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 12 * * 1" # weekly, Mon 12:30 UTC

permissions:
  actions: read
  contents: read
  security-events: write # upload findings to the Security tab

jobs:
  # Full lockfile scan on push to main + weekly
  osv-scan:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8

  # On PRs, only flag vulns the PR introduces (diff scan)
  osv-scan-pr:
    if: ${{ github.event_name == 'pull_request' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
